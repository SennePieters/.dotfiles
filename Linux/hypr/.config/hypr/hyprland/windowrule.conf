# Float Steam and Steam Friends
windowrule {
    name = float-steam
    match:class = ^([Ss]team)$
    workspace = 2
    float = yes
    center = yes
}

# Discord on vertical monitor
windowrule {
    name = discord-vertical
    match:class = ^([Dd]iscord)$
    workspace = 1
}

# Open YouTube Music on special workspace
windowrule {
    name = special-youtube-music
    match:class = chrome-cinhimbnkkaeohfgghhklpknlkffjgod-Default
    workspace = special:music
}

